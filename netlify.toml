[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# routing rules (redirects/rewrites) live in public/_redirects

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # script-src allows 'unsafe-inline' for rev 1 (theme toggle inline scripts);
    # tighten with Astro script hashing later
    # connect-src includes Supabase for the /account auth + token island
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://aberopmtegsusdukrncd.supabase.co; frame-ancestors 'none'"

# The explorer SPA uses inline event handlers; relax script-src for that path
# only. frame-ancestors 'self' lets /explorer and library pages iframe it in
# embed mode.
[[headers]]
  for = "/explorer-app/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'"

# exact-path rule: "/explorer-app/*" does not match "/explorer-app/" itself
[[headers]]
  for = "/explorer-app/"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'"

